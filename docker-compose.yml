services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: quantlab-backend:latest
    env_file:
      - config/quant.env
    environment:
      QUANT_BACKEND_HOST: 0.0.0.0
      QUANT_BACKEND_PORT: 8001
      QUANT_CORS_ORIGINS: http://localhost:8080,http://127.0.0.1:8080
      QUANT_RELOAD: "0"
    volumes:
      - quantlab-data:/app/data
      - ./config/quant.env:/app/config/quant.env:ro
    expose:
      - "8001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/api/health', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  frontend:
    build:
      context: ./web
      dockerfile: Dockerfile
    image: quantlab-frontend:latest
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8080:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  quantlab-data:
